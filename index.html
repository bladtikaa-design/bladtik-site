<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Social</title>

<style>

body{
font-family:sans-serif;
background:#f0f0f0;
text-align:center;
}

#top{
background:white;
padding:10px;
margin-bottom:10px;
}

.avatar{
font-size:28px;
}

.post{
background:white;
margin:10px auto;
padding:10px;
border-radius:10px;
max-width:400px;
}

img{
max-width:100%;
border-radius:10px;
margin-top:5px;
}

button{
margin:4px;
}

</style>
</head>

<body>

<div id="login">

<h2>Write your nickname</h2>

<input id="nickname"><br><br>

<select id="avatar">
<option>😀</option>
<option>😎</option>
<option>🐱</option>
<option>🤖</option>
<option>👑</option>
</select>

<br><br>

<button onclick="login()">Enter</button>

</div>

<div id="app" style="display:none">

<div id="top">
<span id="myavatar" class="avatar"></span>
<b id="user"></b>
</div>

<input id="text" placeholder="Write post"><br><br>

<input type="file" id="photo"><br><br>

<button onclick="post()">Post</button>

<div id="posts"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "PASTE",
authDomain: "PASTE",
projectId: "PASTE",
storageBucket: "PASTE",
messagingSenderId: "PASTE",
appId: "PASTE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let username=localStorage.getItem("username")
let avatar=localStorage.getItem("avatar")

if(username){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

document.getElementById("user").innerText=username
document.getElementById("myavatar").innerText=avatar

}

window.login=function(){

username=document.getElementById("nickname").value
avatar=document.getElementById("avatar").value

localStorage.setItem("username",username)
localStorage.setItem("avatar",avatar)

location.reload()

}

let postCount=0
let today=new Date().toDateString()

window.post=async function(){

let now=new Date().toDateString()

if(now!=today){
today=now
postCount=0
}

if(postCount>=100){
alert("Limit 100 posts today")
return
}

let text=document.getElementById("text").value

await addDoc(collection(db,"posts"),{
user:username,
avatar:avatar,
text:text,
like:0,
love:0,
laugh:0
})

postCount++

}

onSnapshot(collection(db,"posts"),(snapshot)=>{

document.getElementById("posts").innerHTML=""

snapshot.forEach((docSnap)=>{

let data=docSnap.data()

let div=document.createElement("div")
div.className="post"

div.innerHTML=

"<span class='avatar'>"+data.avatar+"</span> <b>"+data.user+"</b><br>"+data.text+"<br>"+

"<button id='l"+docSnap.id+"'>👍 "+data.like+"</button>"+

"<button id='h"+docSnap.id+"'>❤️ "+data.love+"</button>"+

"<button id='c"+docSnap.id+"'>😂 "+data.laugh+"</button>"

document.getElementById("posts").prepend(div)

document.getElementById("l"+docSnap.id).onclick=()=>react(docSnap.id,"like",data.like)
document.getElementById("h"+docSnap.id).onclick=()=>react(docSnap.id,"love",data.love)
document.getElementById("c"+docSnap.id).onclick=()=>react(docSnap.id,"laugh",data.laugh)

})

})

async function react(id,type,count){

let ref=doc(db,"posts",id)

let update={}
update[type]=count+1

await updateDoc(ref,update)

}

</script>

</body>
</html>
