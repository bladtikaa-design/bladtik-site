<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Social</title>

<style>

body{
font-family:sans-serif;
margin:0;
text-align:center;
background:var(--bg);
color:var(--text);
}

:root{
--bg:#f0f0f0;
--card:white;
--text:black;
}

.dark{
--bg:#111;
--card:#1e1e1e;
--text:white;
}

#top{
background:var(--card);
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.post{
background:var(--card);
margin:10px auto;
padding:10px;
border-radius:15px;
max-width:400px;
position:relative;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
cursor:pointer;
}

.postimg{
max-width:100%;
border-radius:10px;
margin-top:5px;
}

button{
border:none;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
margin:2px;
}

.bubble{
background:#007aff;
color:white;
}

.delete{
background:#ff3b30;
color:white;
position:absolute;
top:10px;
right:10px;
}

#profile{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:var(--bg);
display:none;
overflow:auto;
}

</style>
</head>

<body>

<div id="login">

<h2>Nickname</h2>

<input id="nickname"><br><br>
<input type="file" id="avatarInput"><br><br>

<button onclick="login()">Enter</button>

</div>

<div id="app" style="display:none">

<div id="top">

<div>
<img id="myavatar" class="avatar">
<b id="user"></b>
</div>

<button onclick="toggleTheme()">🌙</button>

</div>

<br>

<input id="text" placeholder="Write post"><br><br>
<input type="file" id="photo"><br><br>

<button class="bubble" onclick="post()">Post</button>

<div id="posts"></div>

</div>

<div id="profile">

<div style="font-size:25px;cursor:pointer" onclick="closeProfile()">❌</div>

<img id="profileAvatar" class="avatar" style="width:80px;height:80px">

<h2 id="profileName"></h2>

<div id="profilePosts"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {

apiKey: "PASTE",
authDomain: "PASTE",
projectId: "PASTE",
storageBucket: "PASTE",
messagingSenderId: "PASTE",
appId: "PASTE"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let username=localStorage.getItem("username")
let avatar=localStorage.getItem("avatar")

if(username){

loginSuccess()

}

function loginSuccess(){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

document.getElementById("user").innerText=username
document.getElementById("myavatar").src=avatar

}

window.login=function(){

username=document.getElementById("nickname").value

let file=document.getElementById("avatarInput").files[0]
let reader=new FileReader()

reader.onload=function(){

avatar=reader.result

localStorage.setItem("username",username)
localStorage.setItem("avatar",avatar)

location.reload()

}

reader.readAsDataURL(file)

}

window.post=async function(){

let text=document.getElementById("text").value
let photoFile=document.getElementById("photo").files[0]
let photo=""

if(photoFile){

let reader=new FileReader()

reader.onload=async function(){

photo=reader.result

await addDoc(collection(db,"posts"),{

user:username,
avatar:avatar,
text:text,
photo:photo,
like:0,
love:0,
laugh:0

})

}

reader.readAsDataURL(photoFile)

}else{

await addDoc(collection(db,"posts"),{

user:username,
avatar:avatar,
text:text,
photo:"",
like:0,
love:0,
laugh:0

})

}

}

let reacted={}

onSnapshot(collection(db,"posts"),(snapshot)=>{

document.getElementById("posts").innerHTML=""

snapshot.forEach((docSnap)=>{

let data=docSnap.data()

let div=document.createElement("div")
div.className="post"

let img=""
if(data.photo){
img="<img class='postimg' src='"+data.photo+"'>"
}

let del=""
if(data.user==username){

del="<button class='delete' onclick='delPost(\""+docSnap.id+"\")'>🗑</button>"

}

div.innerHTML=

del+

"<img onclick='openProfile(\""+data.user+"\")' class='avatar' src='"+data.avatar+"'> "+

"<b onclick='openProfile(\""+data.user+"\")'>"+data.user+"</b><br>"+

data.text+"<br>"+img+

"<br>"+

"<button onclick='react(\""+docSnap.id+"\",\"like\","+data.like+")'>👍 "+data.like+"</button>"+

"<button onclick='react(\""+docSnap.id+"\",\"love\","+data.love+")'>❤️ "+data.love+"</button>"+

"<button onclick='react(\""+docSnap.id+"\",\"laugh\","+data.laugh+")'>😂 "+data.laugh+"</button>"

document.getElementById("posts").prepend(div)

})

})

window.react=async function(id,type,count){

if(reacted[id]){

alert("Already reacted")
return

}

reacted[id]=true

let ref=doc(db,"posts",id)

let update={}
update[type]=count+1

await updateDoc(ref,update)

}

window.delPost=async function(id){

await deleteDoc(doc(db,"posts",id))

}

window.openProfile=function(name){

document.getElementById("profile").style.display="block"
document.getElementById("app").style.display="none"

document.getElementById("profileName").innerText=name

onSnapshot(collection(db,"posts"),(snapshot)=>{

document.getElementById("profilePosts").innerHTML=""

snapshot.forEach((docSnap)=>{

let data=docSnap.data()

if(data.user==name){

let div=document.createElement("div")
div.className="post"

let img=""
if(data.photo){
img="<img class='postimg' src='"+data.photo+"'>"
}

div.innerHTML=

"<img class='avatar' src='"+data.avatar+"'> "+

"<b>"+data.user+"</b><br>"+

data.text+"<br>"+img

document.getElementById("profilePosts").append(div)

document.getElementById("profileAvatar").src=data.avatar

}

})

})

}

window.closeProfile=function(){

document.getElementById("profile").style.display="none"
document.getElementById("app").style.display="block"

}

window.toggleTheme=function(){

document.body.classList.toggle("dark")

}

</script>

</body>
</html>
