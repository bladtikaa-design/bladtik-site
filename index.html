<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLADTIK SITE</title>

<style>

body{
font-family:sans-serif;
background:#f0f0f0;
text-align:center;
margin:0;
}

#logo{
position:fixed;
top:10px;
right:10px;
color:white;
-webkit-text-stroke:1px black;
font-weight:bold;
font-size:20px;
}

.post{
background:white;
margin:10px auto;
padding:10px;
border-radius:10px;
max-width:400px;
position:relative;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
}

.postimg{
max-width:100%;
border-radius:10px;
margin-top:5px;
}

.delete{
position:absolute;
top:5px;
right:5px;
border:none;
background:red;
color:white;
border-radius:10px;
cursor:pointer;
}

.reactions button{
margin:3px;
}

.dark{
background:#111;
color:white;
}

.dark .post{
background:#1e1e1e;
}

</style>
</head>

<body>

<div id="logo">BLADTIK SITE</div>

<div id="login">

<h2>Nickname</h2>

<input id="nickname"><br><br>
<input type="file" id="avatarInput"><br><br>

<button onclick="login()">Enter</button>

</div>

<div id="app" style="display:none">

<div>

<img id="myavatar" class="avatar">
<b id="user"></b>

<button onclick="theme()">🌙</button>

</div>

<br>

<input id="text" placeholder="Write post"><br><br>
<input type="file" id="photo"><br><br>

<button onclick="post()">Post</button>

<br><br>

<button onclick="startRecord()">🎤 Record</button>
<button onclick="stopRecord()">Stop</button>

<div id="posts"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAE46eiz4XltTwoPz4mVFG6kvP",
authDomain: "mysocial-dabdf.firebaseapp.com",
projectId: "mysocial-dabdf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let username=localStorage.getItem("username")
let avatar=localStorage.getItem("avatar")

let lastPostTime=0

if(username){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

document.getElementById("user").innerText=username
document.getElementById("myavatar").src=avatar

}

window.login=function(){

username=document.getElementById("nickname").value

let file=document.getElementById("avatarInput").files[0]
let reader=new FileReader()

reader.onload=function(){

avatar=reader.result

localStorage.setItem("username",username)
localStorage.setItem("avatar",avatar)

location.reload()

}

reader.readAsDataURL(file)

}

window.post=async function(){

let now=Date.now()

if(now-lastPostTime<40000){
alert("Подожди 40 секунд перед следующим постом")
return
}

lastPostTime=now

let text=document.getElementById("text").value
let photoFile=document.getElementById("photo").files[0]

let photo=""

if(photoFile){

let reader=new FileReader()

reader.onload=async function(){

photo=reader.result

await addDoc(collection(db,"posts"),{
user:username,
avatar:avatar,
text:text,
photo:photo,
voice:"",
reactions:{
"👍":[],
"🐷":[],
"🙉":[],
"💩":[]
}
})

}

reader.readAsDataURL(photoFile)

}else{

await addDoc(collection(db,"posts"),{
user:username,
avatar:avatar,
text:text,
photo:"",
voice:"",
reactions:{
"👍":[],
"🐷":[],
"🙉":[],
"💩":[]
}
})

}

}

onSnapshot(collection(db,"posts"),(snapshot)=>{

document.getElementById("posts").innerHTML=""

snapshot.forEach((docSnap)=>{

let data=docSnap.data()

let div=document.createElement("div")
div.className="post"

let img=""
if(data.photo){
img="<img class='postimg' src='"+data.photo+"'>"
}

let voice=""
if(data.voice){
voice="<audio controls src='"+data.voice+"'></audio>"
}

let reactions=data.reactions||{
"👍":[],
"🐷":[],
"🙉":[],
"💩":[]
}

div.innerHTML=

"<img class='avatar' src='"+data.avatar+"'> <b>"+data.user+"</b><br>"+
data.text+"<br>"+
img+"<br>"+
voice+"<br>"+

"<div class='reactions'>"+
"<button onclick='react(\""+docSnap.id+"\",\"👍\")'>👍 "+reactions["👍"].length+"</button>"+
"<button onclick='react(\""+docSnap.id+"\",\"🐷\")'>🐷 "+reactions["🐷"].length+"</button>"+
"<button onclick='react(\""+docSnap.id+"\",\"🙉\")'>🙉 "+reactions["🙉"].length+"</button>"+
"<button onclick='react(\""+docSnap.id+"\",\"💩\")'>💩 "+reactions["💩"].length+"</button>"+
"</div>"

document.getElementById("posts").prepend(div)

})

})

window.react=async function(id,emoji){

let ref=doc(db,"posts",id)

onSnapshot(ref, async (snap)=>{

let data=snap.data()

let reactions=data.reactions

for(let key in reactions){
reactions[key]=reactions[key].filter(u=>u!==username)
}

reactions[emoji].push(username)

await updateDoc(ref,{reactions:reactions})

})

}

window.theme=function(){
document.body.classList.toggle("dark")
}

let recorder
let chunks=[]

window.startRecord=async function(){

let stream=await navigator.mediaDevices.getUserMedia({audio:true})

recorder=new MediaRecorder(stream)

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.start()

}

window.stopRecord=function(){

recorder.stop()

recorder.onstop=async function(){

let blob=new Blob(chunks)
chunks=[]

let reader=new FileReader()

reader.onload=async function(){

await addDoc(collection(db,"posts"),{
user:username,
avatar:avatar,
text:"",
photo:"",
voice:reader.result,
reactions:{
"👍":[],
"🐷":[],
"🙉":[],
"💩":[]
}
})

}

reader.readAsDataURL(blob)

}

}

</script>

</body>
</html>
