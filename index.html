<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLADTIK SITE</title>

<style>

body{
font-family:sans-serif;
background:#f0f0f0;
text-align:center;
margin:0;
}

#logo{
position:fixed;
top:10px;
right:10px;
color:white;
-webkit-text-stroke:1px black;
font-weight:bold;
font-size:18px;
}

.post{
background:white;
margin:10px auto;
padding:10px;
border-radius:10px;
max-width:400px;
position:relative;
}

.avatar{
width:40px;
height:40px;
height:40px;
border-radius:50%;
object-fit:cover;
}

.postimg{
max-width:100%;
border-radius:10px;
margin-top:5px;
}

.delete{
position:absolute;
top:5px;
right:5px;
border:none;
background:red;
color:white;
border-radius:10px;
cursor:pointer;
}

.reactions button{
margin:3px;
}

.dark{
background:#111;
color:white;
}

.dark .post{
background:#1e1e1e;
}

</style>
</head>

<body>

<div id="logo">BLADTIK SITE</div>

<div id="login">

<h2>Nickname</h2>

<input id="nickname"><br><br>
<input type="file" id="avatarInput"><br><br>

<button onclick="login()">Enter</button>

</div>

<div id="app" style="display:none">

<div>

<img id="myavatar" class="avatar">
<b id="user"></b>

<button onclick="theme()">🌙</button>
<button onclick="openGroups()">Groups</button>

</div>

<br>

<input id="text" placeholder="Write post"><br><br>
<input type="file" id="photo"><br><br>

<button onclick="post()">Post</button>

<br><br>

<button onclick="startRecord()">🎤 Record voice</button>
<button onclick="stopRecord()">Stop</button>

<div id="posts"></div>

</div>

<div id="groups" style="display:none">

<h2>Groups</h2>

<input id="groupName" placeholder="Group name">
<input type="file" id="groupAvatar">

<br><br>

<button onclick="createGroup()">Create group</button>

<div id="groupList"></div>

<button onclick="closeGroups()">❌ Back</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAE46eiz4XltTwoPz4mVf",
authDomain: "mysocial-dabdf.firebaseapp.com",
projectId: "mysocial-dabdf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let username=localStorage.getItem("username")
let avatar=localStorage.getItem("avatar")

if(username){

loginSuccess()

}

function loginSuccess(){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

document.getElementById("user").innerText=username
document.getElementById("myavatar").src=avatar

}

window.login=function(){

username=document.getElementById("nickname").value

let file=document.getElementById("avatarInput").files[0]
let reader=new FileReader()

reader.onload=function(){

avatar=reader.result

localStorage.setItem("username",username)
localStorage.setItem("avatar",avatar)

location.reload()

}

reader.readAsDataURL(file)

}

window.post=async function(){

let text=document.getElementById("text").value

await addDoc(collection(db,"posts"),{

user:username,
avatar:avatar,
text:text,
photo:"",
reactions:{}

})

}

onSnapshot(collection(db,"posts"),(snapshot)=>{

document.getElementById("posts").innerHTML=""

snapshot.forEach((docSnap)=>{

let data=docSnap.data()

let div=document.createElement("div")
div.className="post"

let reactions=data.reactions||{}

div.innerHTML=

"<img class='avatar' src='"+data.avatar+"'> <b>"+data.user+"</b><br>"+
data.text+

"<div class='reactions'>"+
"<button onclick='react(\""+docSnap.id+"\",\"👍\")'>👍</button>"+
"<button onclick='react(\""+docSnap.id+"\",\"🐷\")'>🐷</button>"+
"<button onclick='react(\""+docSnap.id+"\",\"🙉\")'>🙉</button>"+
"<button onclick='react(\""+docSnap.id+"\",\"💩\")'>💩</button>"+
"</div>"

document.getElementById("posts").prepend(div)

})

})

window.react=async function(id,emoji){

let ref=doc(db,"posts",id)

let obj={}
obj["reactions."+username]=emoji

await updateDoc(ref,obj)

}

window.theme=function(){

document.body.classList.toggle("dark")

}

let recorder
let chunks=[]

window.startRecord=async function(){

let stream=await navigator.mediaDevices.getUserMedia({audio:true})

recorder=new MediaRecorder(stream)

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=async function(){

let blob=new Blob(chunks)
chunks=[]

let reader=new FileReader()

reader.onload=async function(){

await addDoc(collection(db,"posts"),{

user:username,
avatar:avatar,
text:"",
voice:reader.result

})

}

reader.readAsDataURL(blob)

}

recorder.start()

}

window.stopRecord=function(){

recorder.stop()

}

window.openGroups=function(){

document.getElementById("groups").style.display="block"
document.getElementById("app").style.display="none"

}

window.closeGroups=function(){

document.getElementById("groups").style.display="none"
document.getElementById("app").style.display="block"

}

window.createGroup=async function(){

let name=document.getElementById("groupName").value

await addDoc(collection(db,"groups"),{

name:name,
owner:username,
members:[username]

})

}

onSnapshot(collection(db,"groups"),(snapshot)=>{

document.getElementById("groupList").innerHTML=""

snapshot.forEach((docSnap)=>{

let data=docSnap.data()

let div=document.createElement("div")

div.innerHTML=

"<b>"+data.name+"</b> "+
"<button onclick='joinGroup(\""+docSnap.id+"\")'>Join</button>"+
"<button onclick='callGroup()'>📞 Call</button>"

document.getElementById("groupList").append(div)

})

})

window.joinGroup=function(id){

alert("Joined group")

}

window.callGroup=function(){

alert("Group call system coming soon")

}

</script>

</body>
</html>
