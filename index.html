<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Social</title>

<style>

body{
font-family:sans-serif;
background:#f0f0f0;
text-align:center;
}

#top{
background:white;
padding:10px;
margin-bottom:10px;
}

.post{
background:white;
margin:10px auto;
padding:10px;
border-radius:10px;
max-width:400px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
}

img.postimg{
max-width:100%;
border-radius:10px;
margin-top:5px;
}

button{
margin:3px;
}

</style>
</head>

<body>

<div id="login">

<h2>Write your nickname</h2>

<input id="nickname"><br><br>

<input type="file" id="avatarInput"><br><br>

<button onclick="login()">Enter</button>

</div>

<div id="app" style="display:none">

<div id="top">
<img id="myavatar" class="avatar">
<b id="user"></b>
</div>

<input id="text" placeholder="Write post"><br><br>
<input type="file" id="photo"><br><br>

<button onclick="post()">Post</button>

<div id="posts"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "PASTE",
authDomain: "PASTE",
projectId: "PASTE",
storageBucket: "PASTE",
messagingSenderId: "PASTE",
appId: "PASTE"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let username=localStorage.getItem("username")
let avatar=localStorage.getItem("avatar")

if(username){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

document.getElementById("user").innerText=username
document.getElementById("myavatar").src=avatar

}

window.login=function(){

username=document.getElementById("nickname").value

let file=document.getElementById("avatarInput").files[0]
let reader=new FileReader()

reader.onload=function(){

avatar=reader.result

localStorage.setItem("username",username)
localStorage.setItem("avatar",avatar)

location.reload()

}

reader.readAsDataURL(file)

}

let lastMessage=""
let lastTime=0

window.post=async function(){

let text=document.getElementById("text").value

let now=Date.now()

if(text===lastMessage && now-lastTime<60000){

alert("Same message allowed after 1 minute")
return

}

lastMessage=text
lastTime=now

let photoFile=document.getElementById("photo").files[0]
let photo=""

if(photoFile){

let reader=new FileReader()

reader.onload=async function(){

photo=reader.result

await addDoc(collection(db,"posts"),{

user:username,
avatar:avatar,
text:text,
photo:photo,
like:0,
love:0,
laugh:0

})

}

reader.readAsDataURL(photoFile)

}else{

await addDoc(collection(db,"posts"),{

user:username,
avatar:avatar,
text:text,
photo:"",
like:0,
love:0,
laugh:0

})

}

}

let reacted={}

onSnapshot(collection(db,"posts"),(snapshot)=>{

document.getElementById("posts").innerHTML=""

snapshot.forEach((docSnap)=>{

let data=docSnap.data()

let div=document.createElement("div")
div.className="post"

let img=""

if(data.photo){
img="<img class='postimg' src='"+data.photo+"'>"
}

div.innerHTML=

"<img class='avatar' src='"+data.avatar+"'> <b>"+data.user+"</b><br>"+

data.text+"<br>"+img+

"<button id='l"+docSnap.id+"'>👍 "+data.like+"</button>"+

"<button id='h"+docSnap.id+"'>❤️ "+data.love+"</button>"+

"<button id='c"+docSnap.id+"'>😂 "+data.laugh+"</button>"

document.getElementById("posts").prepend(div)

document.getElementById("l"+docSnap.id).onclick=()=>react(docSnap.id,"like",data.like)
document.getElementById("h"+docSnap.id).onclick=()=>react(docSnap.id,"love",data.love)
document.getElementById("c"+docSnap.id).onclick=()=>react(docSnap.id,"laugh",data.laugh)

})

})

async function react(id,type,count){

if(reacted[id]){

alert("You already reacted")
return

}

reacted[id]=true

let ref=doc(db,"posts",id)

let update={}
update[type]=count+1

await updateDoc(ref,update)

}

</script>

</body>
</html>
